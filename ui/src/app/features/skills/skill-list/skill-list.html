<div class="skill-list-header">
  <div>
    <h3>Skills</h3>
    <p class="subtitle">Highlight skills relevant to this resume version.</p>
  </div>

  <button type="button" class="glass-btn glass-btn--primary" [disabled]="loading() || actionLoading()" (click)="openCreateDialog()">
    <app-icon name="add" size="sm" />
    Add skill
  </button>
</div>

@if (loading()) {
  <app-loading-spinner message="Loading skills..." />
} @else if (skills().length === 0) {

  <div class="empty-state compact">
    <app-icon name="psychology" size="xl" />
    <h3>No skills yet</h3>
    <p>Add skills to showcase on this resume version.</p>
    <button type="button" class="glass-btn glass-btn--secondary" (click)="openCreateDialog()">
      <app-icon name="add" size="sm" />
      Add first skill
    </button>
  </div>

} @else {

  <div class="glass-table-wrap">
    <table class="glass-table">
      <thead>
        <tr>
          <th>#</th>
          <th>Skill</th>
          <th></th>
        </tr>
      </thead>
      <tbody>
        @for (skill of skills(); track skill.id) {
          <tr>
            <td>{{ skill.displayOrder }}</td>
            <td>{{ skill.name }}</td>
            <td class="actions-cell">
              <button type="button" class="glass-btn glass-btn--icon glass-btn--ghost" aria-label="Edit skill" (click)="openEditDialog(skill)">
                <app-icon name="edit" size="sm" />
              </button>
              <button type="button" class="glass-btn glass-btn--icon glass-btn--ghost" aria-label="Delete skill" (click)="confirmDelete(skill)">
                <app-icon name="delete" size="sm" />
              </button>
            </td>
          </tr>
        }
      </tbody>
    </table>
  </div>

}
